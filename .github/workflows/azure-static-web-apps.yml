# Next (export -> out/) + API en Function App aparte (func-latcon-booking-prd)
# Secrets → Settings → Secrets and variables → Actions → Secrets:
#   AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_STONE_04E30940F
#   NEXT_PUBLIC_FUNCTIONS_BASE_URL  (URL Function App, sin barra final)

name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Sin cache de npm: evita node_modules corruptos entre runs/OS

      - name: Check API URL secret
        env:
          NEXT_PUBLIC_FUNCTIONS_BASE_URL: ${{ secrets.NEXT_PUBLIC_FUNCTIONS_BASE_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_FUNCTIONS_BASE_URL" ]; then
            echo "::error::Falta el secret NEXT_PUBLIC_FUNCTIONS_BASE_URL en GitHub (Settings → Secrets)."
            exit 1
          fi
          echo "NEXT_PUBLIC_FUNCTIONS_BASE_URL está definido."

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Build static export (out/)
        env:
          NEXT_PUBLIC_FUNCTIONS_BASE_URL: ${{ secrets.NEXT_PUBLIC_FUNCTIONS_BASE_URL }}
          NODE_OPTIONS: --max-old-space-size=4096
          CI: true
        run: npm run build

      - name: Verify out/
        run: |
          test -d out || (echo "::error::No se generó la carpeta out/" && exit 1)
          test -f out/index.html || (echo "::error::Falta out/index.html" && exit 1)
          ls -la out | head -20

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_STONE_04E30940F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: out
          skip_app_build: true

  close_pr_environment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close SWA PR environment
    steps:
      - name: Close Azure Static Web Apps PR
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_STONE_04E30940F }}
          action: close
          app_location: /
