# Next (export -> out/) + API en Function App aparte (func-latcon-booking-prd)
# Secrets → Settings → Secrets and variables → Actions → Secrets:
#   AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_STONE_04E30940F
#   NEXT_PUBLIC_FUNCTIONS_BASE_URL  (URL Function App, sin barra final)
#   NEXT_PUBLIC_GA_MEASUREMENT_ID   (opcional, formato G-XXXXXXXXXX; sin este secret GA simplemente no carga)

name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check API URL secret
        env:
          NEXT_PUBLIC_FUNCTIONS_BASE_URL: ${{ secrets.NEXT_PUBLIC_FUNCTIONS_BASE_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_FUNCTIONS_BASE_URL" ]; then
            echo "::error::Falta el secret NEXT_PUBLIC_FUNCTIONS_BASE_URL en GitHub (Settings → Secrets)."
            exit 1
          fi
          # Valor sin comillas ni espacios (error frecuente al pegar en GitHub)
          CLEAN=$(printf '%s' "$NEXT_PUBLIC_FUNCTIONS_BASE_URL" | tr -d '"' | tr -d '[:space:]')
          echo "NEXT_PUBLIC_FUNCTIONS_BASE_URL length=${#CLEAN}"

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Verify CSS native bindings (Linux)
        run: |
          node -e "require('lightningcss'); console.log('lightningcss OK')"

      - name: Build static export (out/)
        id: build
        env:
          NEXT_PUBLIC_FUNCTIONS_BASE_URL: ${{ secrets.NEXT_PUBLIC_FUNCTIONS_BASE_URL }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NODE_OPTIONS: --max-old-space-size=4096
          CI: true
        run: |
          set -euxo pipefail
          export NEXT_PUBLIC_FUNCTIONS_BASE_URL=$(printf '%s' "$NEXT_PUBLIC_FUNCTIONS_BASE_URL" | tr -d '"' | tr -d '[:space:]')
          export NEXT_PUBLIC_GA_MEASUREMENT_ID=$(printf '%s' "$NEXT_PUBLIC_GA_MEASUREMENT_ID" | tr -d '"' | tr -d '[:space:]')
          npm run build > build-log.txt 2>&1 || {
            echo "::group::Build log"
            cat build-log.txt
            echo "::endgroup::"
            exit 1
          }

      - name: Upload build log on failure
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          retention-days: 3

      - name: Verify out/
        run: |
          test -d out || (echo "::error::No se generó la carpeta out/" && exit 1)
          test -f out/index.html || (echo "::error::Falta out/index.html" && exit 1)
          ls -la out | head -20

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_STONE_04E30940F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Con skip_app_build, app_location = carpeta ya compilada (out/), no la raíz del repo
          app_location: out
          output_location: ""
          skip_app_build: true

  close_pr_environment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close SWA PR environment
    steps:
      - name: Close Azure Static Web Apps PR
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_STONE_04E30940F }}
          action: close
          app_location: /
